<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>솥국 매장 정산 - 로그인</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="icon" href="../app-icon.png">
    <link rel="apple-touch-icon" href="../app-icon.png">
    <link rel="manifest" href="../manifest.json">
</head>
<body>
    <div id="loginScreen" class="container">
        <h1>솥국 지점 로그인</h1>
        <div class="form-group">
            <label for="loginBranchName">지점명</label>
            <input type="text" id="loginBranchName" placeholder="예: 도곡">
        </div>
        <div class="form-group">
            <label for="loginPin">PIN 번호</label>
            <div class="pin-wrapper">
                <input type="tel" id="loginPin" maxlength="6" autocomplete="off">
                <div class="pin-display" id="pinDisplay">
                    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                </div>
            </div>
        </div>
        <button id="loginBtn" class="btn primary">로그인</button>
    </div>
    <script type="module" src="../js/login.js"></script>
</body>
</html>
