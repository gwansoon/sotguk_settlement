<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 환경 줌인 & 줌아웃 -->
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> --> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>솥국 매장 정산</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- 로그인 화면 -->
    <div id="loginScreen" class="container">
        <h1>솥국 지점 로그인</h1>
        <div class="form-group">
            <label for="loginBranchName">지점명</label>
            <input type="text" id="loginBranchName" placeholder="예: 도곡">
        </div>
        <div class="form-group">
            <label for="loginPin">PIN 번호</label>
            <div class="pin-wrapper">
                <input type="password" id="loginPin" maxlength="6" inputmode="numeric" pattern="[0-9]*">
                <div class="pin-display" id="pinDisplay">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>
        </div>
        <button id="loginBtn" class="btn primary">로그인</button>
    </div>

    <!-- 메인 정산 화면 (초기에는 숨김) -->
    <div id="mainScreen" class="container" style="display: none;">
        <h1 class="main-title">
            솥국 
            <span id="branchName" class="inline-input">강남</span> 
             일일 정산
        </h1>
        <p id="currentDate" class="current-date"></p>
        <p id="weatherInfo" class="weather-info"></p>
        
        <!-- 유동인구 영역 -->
        <div class="settlement-section compact">
            <div class="section-header" style="margin-bottom: 0;">
                <h2 style="margin: 0; white-space: nowrap; margin-right: 16px;">유동인구</h2>
                <div class="traffic-buttons" id="trafficButtons">
                    <button class="traffic-btn" data-val="붐빔">붐빔</button>
                    <button class="traffic-btn active" data-val="보통">보통</button>
                    <button class="traffic-btn" data-val="한산함">한산함</button>
                </div>
            </div>
        </div>

        <!-- 재고 관리 영역 -->
        <div class="settlement-section">
            <div class="section-header">
                <h2 id="inventoryToggle" class="toggle-header">재고 관리 <span class="toggle-icon">∨</span></h2>
                <button id="inventoryResetAllBtn" class="reset-all-btn">초기화 ↺</button>
            </div>
            <div id="inventoryContainer" class="hide-inactive"></div>
        </div>

        <!-- 오늘 준비량 정산 영역 -->
        <div class="settlement-section">
            <div class="section-header">
                <h2 id="prepToggle" class="toggle-header">준비량 정산 <span class="toggle-icon">∨</span></h2>
                <button id="prepResetAllBtn" class="reset-all-btn">초기화 ↺</button>
            </div>
            <div id="prepContainer" class="hide-inactive"></div>
        </div>

        <!-- 매출 정산 영역 -->
        <div class="settlement-section">
            <h2>매출 정산</h2>
            <div class="input-row">
                <label>홀 (포장)</label>
                <input type="number" id="salesHallCount" placeholder="건수" inputmode="numeric">
                <input type="text" id="salesHallAmount" placeholder="금액 (원)" inputmode="numeric">
            </div>
            <div class="input-row">
                <label>배달</label>
                <input type="number" id="salesDeliveryCount" placeholder="건수" inputmode="numeric">
                <input type="text" id="salesDeliveryAmount" placeholder="금액 (원)" inputmode="numeric">
            </div>
            <div class="input-row">
                <label>미분류</label>
                <input type="number" id="salesUnclassifiedCount" placeholder="건수" inputmode="numeric">
                <input type="text" id="salesUnclassifiedAmount" placeholder="금액 (원)" inputmode="numeric">
            </div>
            <div class="total-row">
                <span>총 매출액</span>
                <span id="salesTotalAmount">0원</span>
            </div>
        </div>

        <!-- 쿠폰사용 영역 -->
        <div class="settlement-section compact">
            <div class="input-row">
                <h2 style="margin: 0;">쿠폰사용</h2>
                <input type="number" id="couponCount" placeholder="갯수" inputmode="numeric" style="flex: 1; text-align: left; padding: 10px 12px;">
            </div>
        </div>


        <!-- 고기사용량 영역 -->
        <div class="settlement-section compact" style="margin-bottom: 8px;">
            <div class="section-header toggle-header" id="meatToggle" style="margin-bottom: 8px;">
                <div>
                    <h2 style="margin: 0; display: inline-block;">고기사용량</h2>
                    <span style="font-size: 13px; color: #888; margin-left: 6px;">   * 눈꽃고기 해당지점만 입력</span>
                </div>
                <span class="toggle-icon">∨</span>
            </div>
            <div id="meatContainer" class="hide-content">
                <div class="input-row" style="margin-bottom: 8px;">
                    <span style="flex: 0 0 65px; font-size: 13px; color: #555;">이번달 누적</span>
                    <span id="meatCumulative" style="flex: 1; text-align: right; font-weight: bold; color: #2c3e50;">0kg</span>
                </div>
                <div class="input-row">
                    <span style="flex: 0 0 65px; font-size: 13px; color: #555;">오늘 사용</span>
                    <input type="number" id="meatUsage" placeholder="kg" inputmode="numeric" style="flex: 1; text-align: right; padding: 8px 12px;">
                </div>
            </div>
        </div>


        <!-- 특이사항 영역 -->
        <div class="settlement-section">
            <h2>특이사항(전달사항)</h2>
            <textarea id="memoInput" rows="3" placeholder="오늘 있었던 특이사항이나 본사에 전달할 내용을 적어주세요."></textarea>
        </div>

        <div class="button-group">
            <button id="saveBtn" class="btn primary">요약보기</button>
            <div id="resultArea" class="result-area" style="display: none;">
                <button id="closeResultBtn" class="close-btn">&times;</button>
                <h3>📝 정산 요약</h3>
                <p id="summaryText"></p>
            </div>
            <button id="shareBtn" class="btn kakao">💬 정산 내역 공유하기</button>
        </div>
        
    </div>
    <div class="version-info">v1.0.0 Buildit.</div>

    <!-- 하단 푸터 메뉴 -->
    <footer id="footerNav" style="display: none;">
        <nav class="footer-menu">
            <a href="#" class="menu-item active">
                <span class="icon">📊</span>
                <span class="label">일일정산</span>
            </a>
            <a href="#" class="menu-item">
                <span class="icon">🏠</span>
                <span class="label">Test</span>
            </a>
            <a href="#" class="menu-item">
                <span class="icon">⚙️</span>
                <span class="label">Test</span>
            </a>
        </nav>
    </footer>
    <script type="module" src="app.js"></script>
</body>
</html>
